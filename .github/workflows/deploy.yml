name: Build and Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: PROD 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: gennadypol/board-games-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: PROD
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Заходим в общую папку проекта на VPS
            cd ~/my_app
            
            # 2. Скачиваем только новый образ фронтенда из Docker Hub
            docker compose pull frontend
            
            # 3. Перезапускаем ТОЛЬКО фронтенд. 
            # Флаг --no-deps гарантирует, что база и бэкенд не перезагрузятся.
            docker compose up -d --no-deps frontend
            
            # 4. Удаляем старые ненужные слои образов, чтобы не забивать диск
            docker image prune -f
