name: Build and Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: PROD 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Вшиваем IP сервера в билд (замени на свой IP)
          build-args: |
            VITE_API_URL=http://${{ secrets.HOST }}/api
          # Замени 'ваш_логин' на свой логин в Docker Hub
          tags: gennadypol/board-games-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: PROD
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/my_app/frontend-project
            git pull origin main
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # Скачиваем готовый тяжелый билд с Docker Hub
            docker compose pull frontend
            # Просто перезапускаем контейнер (занимает 2 секунды)
            docker compose up -d frontend
            
            # Удаляем старый образ, чтобы не забивать диск
            docker image prune -f
