name: Build and Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: PROD 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Аргументы сборки больше не нужны, так как фронтенд 
          # теперь использует относительные пути в JS коде
          tags: gennadypol/board-games-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: PROD
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/my_app/frontend-project
            # Обновляем docker-compose на сервере, если он менялся
            git checkout docker-compose.yml
            git pull origin main
            
            # Обновляем окружение (если нужно для compose)
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # Скачиваем свежий образ и перезапускаем сервис
            docker compose pull frontend
            docker compose up -d frontend
            
            # Чистим старые слои образа
            docker image prune -f
