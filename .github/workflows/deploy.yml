name: Deploy Frontend
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/my_app/frontend-project # ЗАХОДИМ В ПАПКУ ФРОНТА
            git pull origin main         # ОБНОВЛЯЕМ КОД
            echo "${{ secrets.ENV_FILE }}" > .env # ОБНОВЛЯЕМ СЕКРЕТЫ
            cd ..                        # ВЫХОДИМ В КОРЕНЬ
            docker-compose up -d --build frontend # ПЕРЕЗАПУСКАЕМ ТОЛЬКО ФРОНТ
